version: "3.9"

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17      # ← 공식 컨트롤러 이미지
    container_name: anpetna-jenkins
    # 컨트롤러 UI: 호스트 8081 → 컨테이너 8080
    ports:
      - "8081:8080"
    # (선택) 에이전트 JNLP 포트 외부 공개가 필요 없다면 열지 않아도 됩니다.
    # - "50001:50000"
    # 도커 빌드/배포를 컨트롤러에서 하려면 docker.sock 마운트 유지
    user: root
    volumes:
      - ${HOST_JENKINS_HOME:-/opt/anpetna/jenkins}:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped
    networks: [vpc]

  worker-1:
    image: jenkins/ssh-agent:latest-jdk17  # ← 공식 SSH 에이전트
    container_name: anpetna-worker-1
    # 호스트 디렉터리 바인드(필요 없다면 제거 가능)
    volumes:
      - ${HOST_JENKINS_WORKER_1:-/opt/anpetna/jenkins/worker1}:/home/jenkins
    environment:
      - TZ=Asia/Seoul
      - JENKINS_SLAVE_SSH_PUBKEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFtghirs3zevhpWBmV75ufquWFrMTryzKUU+IhZT2lIu jenkins@controller-20250918
      - JENKINS_AGENT_SSH_PUBKEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFtghirs3zevhpWBmV75ufquWFrMTryzKUU+IhZT2lIu jenkins@controller-20250918
    # Docker 네트워크 상에서 jenkins ↔ worker-1 통신(SSH:22)
    expose:
      - "22"
    restart: unless-stopped
    networks: [vpc]

networks:
  vpc:
    driver: bridge
