services:
  app:
      image: rayoh95/anpetna:latest
      ports:
        - 8080:8080
      environment:
        SPRING_PROFILES_ACTIVE: dev
  jenkins:
    image: jenkins/jenkins:latest-jdk17
    ports:
      - "8081:8080"
      - "50001:50000"
    volumes:
      - ${HOST_JENKINS_HOME}:/var/jenkins_home

    links:
      - worker-1

  worker-1:
    image: jenkins/ssh-agent:latest-jdk17
    volumes:
      - ${HOST_JENKINS_WORKER_1}:/home/jenkins
    environment:
      - JENKINS_SLAVE_SSH_PUBKEY=ssh-rsa  jenkins@2dc6aead33e6

