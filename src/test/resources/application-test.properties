# --- 데이터소스: H2 인메모리 ---
spring.datasource.url=jdbc:h2:mem:carttest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
# H2 기본 계정
spring.datasource.username=sa
spring.datasource.password=

# --- JPA/Hibernate ---
# 테스트 시작 시 스키마 생성, 종료 시 드롭
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate 6 바인딩 파라미터 로그 (스프링부트 3.x)
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# --- SQL 스크립트/마이그레이션 끄기(원치 않을 때) ---
spring.sql.init.mode=never
spring.flyway.enabled=false
spring.liquibase.enabled=false

# --- (옵션) H2 콘솔 디버깅용 ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -- Access Token 설정 --
# 대칭 서명용 비밀키
jwt.secret=0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF
# 유효기간 = 1800초(30분)
jwt.access-ttl-seconds=1800
# 클라이언트가 토큰을 실어 보내는 HTTP 헤더 이름
jwt.header=Authorization
# 헤더 값의 토큰 앞 접두사. 보통 "Bearer " (공백 포함)
jwt.prefix=Bearer 
# JWT의 어느 클레임에서 사용자 식별자(이ㅏ이디)를 읽을지 지정.
jwt.claim.username=sub

