user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- 업스트림 정의(서비스명은 docker-compose-app.yml과 일치) ----
    upstream app-blue {
        server app-blue:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }
    upstream app-green {
        server app-green:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ---- 활성 업스트림을 외부 파일에서 주입(1줄짜리) ----
    # 파일 내용 예:  set $active_upstream app-blue;
    include /etc/nginx/conf.d/active-upstream.conf;

    # (선택) 파이프라인/환경별 추가 설정 파일(액세스 제어 등)
    # include /etc/nginx/conf.d/fastcampus-cicd.conf;

    # ---- 기본 서버 ----
    server {
        listen 80;
        server_name localhost;

        # 업로드/타임아웃/버퍼
        client_max_body_size 50m;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout   300s;

        # 스프링/웹소켓/SSE 안정화
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ""      close;
        }

        # 공통 헤더
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 에러/리트라이 정책(백엔드 에러 시 재시도)
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        # 정적: 프론트가 Nginx에서 서빙한다면 여기 location 추가

        # ---- 애플리케이션 프록시 ----
        location / {
            proxy_pass http://$active_upstream;
            proxy_buffering off;  # SSE 사용 시 권장
        }

        # ---- 헬스체크(선택): 현재 활성 쪽으로 프록시됨 ----
        location = /nginx/health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
        # 백엔드 헬스(스프링 actuator 사용 시)
        location = /actuator/health {
            proxy_pass http://$active_upstream/actuator/health;
        }
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # conf.d/*.conf 전체를 쓰려면 주석 해제(활성 파일 포함)
    include /etc/nginx/conf.d/*.conf;
}
