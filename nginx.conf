user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- 업스트림 정의(서비스명은 docker-compose-app.yml과 일치) ----
    upstream app-blue {
        server app-blue:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }
    upstream app-green {
        server app-green:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # WebSocket/SSE용 커넥션 업그레이드 매핑 (★ http 컨텍스트에 있어야 함)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # ---- 기본 서버 ----
    server {
        listen 80;
        server_name localhost;

        # (★) 활성 업스트림 1줄짜리 파일을 server 컨텍스트에서 include
        # 파일 내용 예:  set $active_upstream app-blue;
        include /etc/nginx/conf.d/active-upstream.conf;

        # 업로드/타임아웃/버퍼
        client_max_body_size 50m;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout   300s;

        # 스프링/웹소켓/SSE 안정화
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 공통 헤더
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 에러/리트라이 정책
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        # ---- 애플리케이션 프록시 ----
        location / {
            proxy_pass http://$active_upstream;
            proxy_buffering off;  # SSE 사용 시 권장
        }

        # ---- 헬스체크 ----
        location = /nginx/health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
        location = /actuator/health {
            proxy_pass http://$active_upstream/actuator/health;
        }
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # conf.d/*.conf 전체 인클루드는 비활성화 (active-upstream.conf가 http로 들어오면 에러)
    # include /etc/nginx/conf.d/*.conf;
}
