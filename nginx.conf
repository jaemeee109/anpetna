# /etc/nginx/nginx.conf
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- 업스트림 정의(컨테이너 서비스명과 포트 일치) ----
    upstream app-blue {
        server app-blue:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }
    upstream app-green {
        server app-green:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # WebSocket/SSE 업그레이드 매핑 (http 컨텍스트에 위치해야 함)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # ---- 기본 서버 ----
    server {
        listen 80;
        server_name _;

        # ★ 활성 업스트림 변수 주입(1줄짜리 파일)
        # 파일 내용 예시:  set $active_upstream app-blue;
        include /etc/nginx/conf.d/active-upstream.var;

        # 타임아웃/바디 제한
        client_max_body_size    50m;
        proxy_connect_timeout   60s;
        proxy_send_timeout      60s;
        proxy_read_timeout     300s;

        # 공통 프록시 헤더 및 업그레이드 처리
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 백엔드 오류 시 재시도 정책(과도한 재시도 방지를 위해 2회로 제한)
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        # ---- 애플리케이션 프록시 ----
        location / {
            proxy_pass http://$active_upstream;
            proxy_buffering off;   # SSE/스트리밍 시 권장
        }

        # ---- 헬스체크 ----
        location = /nginx/health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
        location = /actuator/health {
            proxy_pass http://$active_upstream/actuator/health;
        }
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # ★ 와일드카드 include 비활성화(여기에 *.conf를 끌어오면 다시 에러가 납니다)
    # include /etc/nginx/conf.d/*.conf;
}
