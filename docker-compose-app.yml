networks:
  vpc:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.0.0/24
          gateway: 192.168.0.1

services:
  app-blue:
    image: rayoh95/anpetna:latest
    container_name: app-blue
    hostname: app-blue
    expose:
      - "8080"
    volumes:
      - ./src/main/resources/application-blue.yml:/application.yml:ro
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      vpc:
        ipv4_address: 192.168.0.3

  app-green:
    image: rayoh95/anpetna:latest
    container_name: app-green
    hostname: app-green
    expose:
      - "8080"
    volumes:
      - ./src/main/resources/application-green.yml:/application.yml:ro
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      vpc:
        ipv4_address: 192.168.0.4

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    hostname: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx-conf:/etc/nginx/conf.d:ro
    depends_on:
      - app-blue
      - app-green
    networks:
      vpc:
        ipv4_address: 192.168.0.2