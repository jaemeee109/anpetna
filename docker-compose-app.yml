networks:
  vpc:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: anpetna
      MYSQL_USER: anpetna
      MYSQL_PASSWORD: anpass
    # 필요 없으면 아래 포트 매핑 삭제
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uanpetna -panpass --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [vpc]

  app-blue:
    image: rayoh95/anpetna:latest
    container_name: app-blue
    hostname: app-blue
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://192.168.0.181:3306/anpetnadb
      SPRING_DATASOURCE_USERNAME: anpetnaitem
      SPRING_DATASOURCE_PASSWORD: anpetna220
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [vpc]

  app-green:
    image: rayoh95/anpetna:latest
    container_name: app-green
    hostname: app-green
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://192.168.0.181:3306/anpetnadb
      SPRING_DATASOURCE_USERNAME: anpetnaitem
      SPRING_DATASOURCE_PASSWORD: anpetna220
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [vpc]

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    hostname: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx-conf:/etc/nginx/conf.d:ro
    depends_on:
      - app-blue
      - app-green
    networks: [vpc]
