networks:
  vpc:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  app-blue:
    image: rayoh95/anpetna:latest
    container_name: app-blue
    hostname: app-blue
    expose: ["8080"]
    environment:
      TZ: Asia/Seoul
      SPRING_DATASOURCE_URL: jdbc:mariadb://100.116.163.33:3306/anpetnadb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&connectTimeout=30000&socketTimeout=60000&tcpKeepAlive=true
      SPRING_DATASOURCE_USERNAME: anpetnaitem
      SPRING_DATASOURCE_PASSWORD: anpetna220
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # (선택) Hikari 튜닝
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "0"  # DB 늦게 열려도 부팅 지속
    restart: unless-stopped
    networks: [vpc]

  app-green:
    image: rayoh95/anpetna:latest
    container_name: app-green
    hostname: app-green
    expose: ["8080"]
    environment:
      TZ: Asia/Seoul
      SPRING_DATASOURCE_URL: jdbc:mariadb://100.116.163.33:3306/anpetnadb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&connectTimeout=30000&socketTimeout=60000&tcpKeepAlive=true
      SPRING_DATASOURCE_USERNAME: anpetnaitem
      SPRING_DATASOURCE_PASSWORD: anpetna220
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "0"
    restart: unless-stopped
    networks: [vpc]

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    hostname: api-gateway
    ports: ["80:80"]
    volumes:
      - ${APP_DIR}/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${APP_DIR}/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app-blue
      - app-green
    restart: unless-stopped
    networks: [vpc]
